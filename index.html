<!DOCTYPE html><html lang="es">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Cailewey Asistencia Vial</title><style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:500px;
margin:auto;
background:#1c1c1c;
padding:25px;
border-radius:10px;
}

input,select{
width:100%;
padding:12px;
margin:8px 0;
border-radius:6px;
border:none;
}

button{
padding:14px;
background:#00c853;
color:white;
border:none;
border-radius:8px;
width:100%;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#00a844;
}

.whatsapp{
background:#25D366;
margin-top:10px;
}

</style></head><body><div class="container"><h2>Cailewey</h2>
<p>Solicita asistencia vial</p><form id="form"><input name="nombre" placeholder="Nombre" required><input name="telefono" placeholder="Teléfono" required><input name="ubicacion" id="ubicacion" placeholder="Ubicación"><select name="servicio"><option value="ponchadura">Ponchadura</option>
<option value="bateria">Paso de corriente</option>
<option value="gasolina">Gasolina</option>
<option value="grua">Grúa</option></select><button type="button" onclick="gps()">
Obtener ubicación GPS
</button><button type="submit">
Solicitar servicio
</button></form><button class="whatsapp" onclick="whatsapp()">
Contactar por WhatsApp
</button></div><script>

const scriptURL="https://script.google.com/macros/s/AKfycbxNpT7FNwA3i7VUEzaaEWxgNCIZIWa4S9ikuaWJ_KuFLNdQ2VPMxQ0tRzoxyVXYWSWP/exec"

document.getElementById("form").addEventListener("submit",function(e){

e.preventDefault()

const data=new FormData(this)

fetch(scriptURL,{
method:"POST",
body:data
})
.then(()=>{

alert("Solicitud enviada")

whatsapp()

})
.catch(()=>alert("Error al enviar"))

})

function whatsapp(){

const telefono="523319053634"

const mensaje="Hola solicito asistencia vial"

const url=`https://wa.me/${telefono}?text=${encodeURIComponent(mensaje)}`

window.open(url)

}

function gps(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(pos=>{

let lat=pos.coords.latitude
let lon=pos.coords.longitude

let link=`https://maps.google.com/?q=${lat},${lon}`

document.getElementById("ubicacion").value=link

})

}else{

alert("GPS no disponible")

}

}

</script></body>
</html>
